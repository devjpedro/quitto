name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quitto
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio12345
          MINIO_DEFAULT_BUCKETS: quitto-proofs
        ports: ["9000:9000"]
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/quitto
      BETTER_AUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      BETTER_AUTH_URL: http://localhost:3000
      WEB_ORIGIN: http://localhost:3001
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: quitto-proofs
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun --filter @quitto/api run db:migrate
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
